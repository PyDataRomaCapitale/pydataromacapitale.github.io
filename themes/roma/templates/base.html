<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">
<head>
    <meta charset="utf-8">
    <title>{% if page and page.title %}{{ page.title }} · {% endif %}{{ SITENAME }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet"
          integrity="sha384-c9MVH4yRDZMY+bSlECVISp9U4xBl1dKb5z4x8IgF6lBKTHsh1AtxHBfHiiA+S/Nr" crossorigin="anonymous">
    <link href="{{ SITEURL }}/theme/css/style.css" rel="stylesheet">
    <link rel="icon" href="{{ SITEURL }}/favicon.ico">
    <noscript>
        <style>
            .layer-wrapper {
                margin-top: 20% !important;
            }
            .snap-section {
                opacity: 1 !important;
                transform: none !important;
            }
            .navbar-collapse {
                display: block !important;
            }
            .navbar-toggler {
                display: none !important;
            }

            html {
              -ms-overflow-style: auto; /* IE and Edge */
              scrollbar-width: auto; /* Firefox */
            }

            html::-webkit-scrollbar {
              display: auto;
            }
        </style>
    </noscript>
</head>
<body>
<div class="parallax-background">
    <div class="parallax-layer layer-sky"></div>
    <div class="layer-wrapper layer-wrapper-0"><div class="parallax-layer layer-0" data-speed="0.00375" data-offset="0"></div></div>
    <div class="layer-wrapper layer-wrapper-1"><div class="parallax-layer layer-1" data-speed="0.0075" data-offset="0"></div></div>
    <div class="layer-wrapper layer-wrapper-2"><div class="parallax-layer layer-2" data-speed="0.0125" data-offset="0"></div></div>
    <div class="layer-wrapper layer-wrapper-3"><div class="parallax-layer layer-3" data-speed="0.015" data-offset="0" data-lift="-7"></div></div>
</div>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-uppercase" href="{{ SITEURL }}/" title="{{ SITENAME }}">
            <img src="{{ SITEURL }}/theme/images/logos/cube_logo.svg" alt="PyData" class="brand-logo" aria-hidden="true">
            <img src="{{ SITEURL }}/theme/images/logos/snake_logo.svg" alt="{{ SITENAME }}" class="brand-logo" aria-hidden="true">
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                {% for title, url in MENUITEMS %}
                <li class="nav-item"><a class="nav-link" href="{{ url }}">{{ title }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </div>
</nav>
<div class="content">
    {% block content %}{% endblock %}
</div>
<footer class="py-4 bg-dark text-white">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
        <!-- copyright -->
        <p class="mb-0">© {{ now().year }} {{ SITENAME }}</p>

        <!-- socials -->
        <div class="d-flex gap-3">
            {% for name, url, icon in SOCIAL %}
            {% if icon == "meetup" %}
            <a class="social-link" href="{{ url }}" aria-label="{{ name }}">
                <img src="{{ SITEURL }}/images/meetup.svg" alt="" class="icon-img">
            </a>
            {% else %}
            <a class="social-link" href="{{ url }}" aria-label="{{ name }}"><i class="{{ icon }}"></i></a>
            {% endif %}
            {% endfor %}
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
<script src="{{ SITEURL }}/theme/js/main.js"></script>
</body>
</html>
